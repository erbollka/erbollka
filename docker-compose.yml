services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: retail_report_ai
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql:ro

  backend:
    image: python:3.12-slim
    working_dir: /app
    command: sh -c "apt-get update && apt-get install -y --no-install-recommends fonts-dejavu-core && pip install -r requirements.txt && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/retail_report_ai
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      - postgres

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      VITE_API_URL: http://localhost:8000
    ports:
      - "3000:5173"
    volumes:
      - ./:/app
    depends_on:
      - backend

volumes:
  postgres_data:
